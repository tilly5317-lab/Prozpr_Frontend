# Build frontend Docker image, push to GHCR, optionally SSH to EC2 and docker compose pull/up.
#
# Requires: Workflow permissions → Read and write (for GHCR).
# Variables: VITE_API_BASE_URL (repo Variables or Secrets — baked into the static build).
#
# Secrets: EC2_HOST, EC2_USER, EC2_SSH_PRIVATE_KEY
# Variables (optional SSH): DEPLOY_ENABLED=true, DEPLOY_PATH, DEPLOY_SERVICE
#   Optional: DEPLOY_COMPOSE_FILE, DEPLOY_SSH_PORT, secret GHCR_PULL_TOKEN

name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL != '' && vars.VITE_API_BASE_URL || secrets.VITE_API_BASE_URL }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check VITE_API_BASE_URL
        run: |
          if [ -z "$VITE_API_BASE_URL" ]; then
            echo "Set VITE_API_BASE_URL in repository Variables or Secrets."
            exit 1
          fi

      - id: image
        run: echo "full=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ env.VITE_API_BASE_URL }}
            GIT_COMMIT=${{ github.sha }}
          tags: |
            ${{ steps.image.outputs.full }}:main
            ${{ steps.image.outputs.full }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  remote:
    needs: publish
    if: vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: ${{ vars.DEPLOY_SSH_PORT != '' && vars.DEPLOY_SSH_PORT || 22 }}
          envs: GHCR_PULL_TOKEN
          script_stop: true
          script: |
            set -euo pipefail
            if [ -n "${GHCR_PULL_TOKEN:-}" ]; then
              echo "$GHCR_PULL_TOKEN" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
            fi
            DEPLOY_PATH='${{ vars.DEPLOY_PATH }}'
            if [ -z "$DEPLOY_PATH" ]; then echo "DEPLOY_PATH is not set"; exit 1; fi
            cd "$DEPLOY_PATH"
            COMPOSE_FILE='${{ vars.DEPLOY_COMPOSE_FILE }}'
            [ -z "$COMPOSE_FILE" ] && COMPOSE_FILE=docker-compose.yml
            SERVICE='${{ vars.DEPLOY_SERVICE }}'
            if [ -z "$SERVICE" ]; then echo "DEPLOY_SERVICE is not set"; exit 1; fi
            docker compose -f "$COMPOSE_FILE" pull "$SERVICE"
            docker compose -f "$COMPOSE_FILE" up -d "$SERVICE"
