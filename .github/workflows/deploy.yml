# Deploy frontend on the server over SSH: git pull, npm install, build, copy to nginx docroot.
# No Docker — static files served from /var/www/html (or your path below).
#
# GitHub Secrets (repository or "production" environment):
#   HOST, USERNAME, KEY   — preferred
#   EC2_HOST, EC2_USER, EC2_SSH_PRIVATE_KEY — fallbacks (same as older workflows)
#
# Optional repository variable:
#   SSH_PORT          — SSH port if not 22
#
# Vite env: set VITE_API_BASE_URL (and any other VITE_*) in ~/Prozpr_Frontend/.env on the
# server before deploy, or the build will not embed the correct API URL.
#
# Server layout:
#   ~/Prozpr_Frontend — git clone; npm run build writes dist/

name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Require SSH host and credentials
        env:
          SSH_HOST: ${{ secrets.HOST || secrets.EC2_HOST }}
          SSH_USER: ${{ secrets.USERNAME || secrets.EC2_USER }}
          SSH_KEY: ${{ secrets.KEY || secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$SSH_HOST" ]; then
            echo "::error::Missing server host. Add secret HOST or EC2_HOST on the repo or production environment."
            exit 1
          fi
          if [ -z "$SSH_USER" ]; then
            echo "::error::Missing SSH user. Add secret USERNAME or EC2_USER."
            exit 1
          fi
          if [ -z "$SSH_KEY" ]; then
            echo "::error::Missing SSH private key. Add secret KEY or EC2_SSH_PRIVATE_KEY."
            exit 1
          fi

      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST || secrets.EC2_HOST }}
          username: ${{ secrets.USERNAME || secrets.EC2_USER }}
          key: ${{ secrets.KEY || secrets.EC2_SSH_PRIVATE_KEY }}
          port: ${{ vars.SSH_PORT != '' && vars.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            cd ~/Prozpr_Frontend
            git fetch --all
            git reset --hard origin/main
            npm install
            npm run build
            sudo cp -r dist/* /var/www/html/
